name: verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: python -m pip install --upgrade pip networkx numpy

      - name: Independently verify order-25 witness
        run: python code/scripts/independent_verify_order25_witness.py

      - name: Check README census hashes
        run: python code/scripts/check_hashes.py --readme README.md --results-dir results
